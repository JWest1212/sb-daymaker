name: nightly-ingest

# Phase 13: runs automatically every night, plus the manual "Run workflow" button.
on:
  schedule:
    # 09:00 UTC = 02:00 America/Los_Angeles (PDT). Cron is fixed-UTC, so this is
    # 01:00 local in winter (PST) — fine for a nightly batch.
    - cron: '0 9 * * *'
    # Edition drafter (spec §3.1, amended): originally 19:00 PT the night before
    # each send; moved to morning-of-the-day-before so the operator gets a full
    # day to review instead of just an overnight window. 13:00 UTC Wed/Sat =
    # 06:00 PDT Wed/Sat (fixed-UTC, same DST-drift tradeoff as every other cron
    # here — 05:00 local in winter PST). Runs draftEdition.ts INSTEAD of the
    # regular ingest — see the job steps' `if:` conditions below.
    - cron: '0 13 * * 3,6'
  workflow_dispatch:
    inputs:
      draft_edition:
        description: 'Draft the next edition on demand (ingest/draftEdition.ts, auto Wed/Sat mode)'
        type: boolean
        default: false
      enrich_backfill:
        description: 'Re-enrich all needs_review rows with no blurb (ENRICH_BACKFILL=1)'
        type: boolean
        default: false
      image_backfill:
        description: 'Refresh images for needs_review rows (IMAGE_BACKFILL=1)'
        type: boolean
        default: false
      weight_backfill:
        description: 'Auto-downweight civic filler on existing rows (WEIGHT_BACKFILL=1)'
        type: boolean
        default: false
      repeat_backfill:
        description: 'Re-resolve repeat-offender photos for variety (REPEAT_BACKFILL=1)'
        type: boolean
        default: false
      repeat_threshold:
        description: 'Repeat-offender share threshold (1 = spread even pairs; default 3)'
        type: string
        default: '3'
      voice_backfill:
        description: 'Re-draft published blurbs in the new knowing-local-friend voice (VOICE_BACKFILL=1)'
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22+ — supabase-js's realtime client needs native WebSocket
          # (added in Node 22; Node 20 is also now deprecated by setup-node).
          node-version: '22'
      - run: npm ci
      # The drafter schedule replaces the regular ingest run that night (both would
      # be redundant hours apart) — every other trigger (nightly schedule, manual
      # dispatch) still runs the full ingest as before.
      - name: Nightly ingest
        if: github.event.schedule != '0 13 * * 3,6'
        run: npx tsx ingest/run.ts
        env:
          ENRICH_BACKFILL: ${{ inputs.enrich_backfill == true && '1' || '' }}
          IMAGE_BACKFILL: ${{ inputs.image_backfill == true && '1' || '' }}
          WEIGHT_BACKFILL: ${{ inputs.weight_backfill == true && '1' || '' }}
          REPEAT_BACKFILL: ${{ inputs.repeat_backfill == true && '1' || '' }}
          REPEAT_THRESHOLD: ${{ inputs.repeat_threshold }}
          VOICE_BACKFILL: ${{ inputs.voice_backfill == true && '1' || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          # Phase 11: batch enrichment. If unset, the run still lands rows with plain titles.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Phase 13: images + digest. Each is optional — missing keys degrade gracefully
          # (free image sources only / placeholders / digest skipped), never a hard failure.
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_PLACES_KEY: ${{ secrets.GOOGLE_PLACES_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          # Phase 14: managed-scrape reserve (OFF by default). To route a blocked
          # source through Scrapfly, set MANAGED_SCRAPE to its key (e.g. "soho") and
          # add SCRAPFLY_KEY. Empty = every source uses plain HTTP.
          MANAGED_SCRAPE: ${{ secrets.MANAGED_SCRAPE }}
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
          # Wave 4: SeatGeek backstop (free client_id; omit to skip)
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
      - name: Draft the edition
        if: github.event.schedule == '0 13 * * 3,6' || inputs.draft_edition == true
        run: npx tsx ingest/draftEdition.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
