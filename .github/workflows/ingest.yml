name: nightly-ingest

# Phase 10: manual "Run workflow" button only. The nightly schedule is added in
# Phase 13 (per the build guide) once all adapters + the digest are wired.
on:
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22+ — supabase-js's realtime client needs native WebSocket
          # (added in Node 22; Node 20 is also now deprecated by setup-node).
          node-version: '22'
      - run: npm ci
      - run: npx tsx ingest/run.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
