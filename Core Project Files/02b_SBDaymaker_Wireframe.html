<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SB Daymaker — Interactive Wireframe v9</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --plaster:#F6F1E7; --plaster2:#EFE7D8; --ink:#241C16; --ink2:#4a4038;
    --pacific:#16586A; --pacificDk:#0E3C49; --tile:#C0532E; --gold:#E0A82E;
    --sage:#7E8B6B; --line:#D8CDB8; --purple:#9C6B9E; --forest:#3E7C5A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:radial-gradient(1200px 700px at 50% -10%,#2c6b78 0%,#16586A 35%,#0E3C49 100%);display:flex;flex-direction:column;align-items:center;min-height:100vh;}
  .serif{font-family:'Fraunces',Georgia,serif;}

  /* PROTO TOOLBAR */
  .proto{width:100%;max-width:880px;padding:16px 18px 6px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .proto .title{display:flex;align-items:center;gap:10px;}
  .proto .title .m{width:30px;height:30px;border-radius:8px;background:#fff;color:var(--pacific);display:grid;place-items:center;font-weight:900;font-family:'Fraunces',serif;font-size:17px;}
  .proto .title .nm{font-family:'Fraunces',serif;font-weight:600;font-size:17px;line-height:1;}
  .proto .title .sub{font-size:10px;opacity:.7;letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-top:2px;}
  .proto .ctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .seg{display:flex;gap:2px;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;}
  .seg button{border:none;background:transparent;color:rgba(255,255,255,.7);font-size:11px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;}
  .seg button.on{background:#fff;color:var(--pacific);}
  .seg .lbl{font-size:9px;color:rgba(255,255,255,.5);align-self:center;padding:0 4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .restart{border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:11px;font-weight:700;padding:7px 12px;border-radius:8px;cursor:pointer;}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 12px 30px;width:100%;}

  /* DEVICE */
  .device{width:400px;max-width:100%;background:#15110d;border-radius:42px;padding:12px;box-shadow:0 40px 90px -30px rgba(0,0,0,.7),0 0 0 2px rgba(255,255,255,.06);position:relative;}
  .device-screen{background:var(--plaster);border-radius:32px;overflow:hidden;position:relative;height:740px;max-height:78vh;}
  .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:130px;height:28px;background:#15110d;border-radius:0 0 16px 16px;z-index:200;}
  @media(max-width:460px){
    .device{border-radius:0;padding:0;width:100%;box-shadow:none;}
    .device-screen{border-radius:0;height:calc(100vh - 96px);max-height:none;}
    .notch{display:none;}
    body{background:var(--plaster);}
  }
  #app{position:absolute;inset:0 0 56px 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  #app::-webkit-scrollbar{width:0;}
  #nav{position:absolute;bottom:0;left:0;right:0;height:56px;display:flex;border-top:1px solid var(--line);background:rgba(246,241,231,.96);backdrop-filter:blur(10px);z-index:60;}
  #overlay{position:absolute;inset:0;z-index:120;pointer-events:none;}
  #overlay.active{pointer-events:auto;}
  #lensOverlay{position:absolute;inset:0;z-index:160;pointer-events:none;}
  #lensOverlay.active{pointer-events:auto;}

  /* NAV — 3 tabs (Explore · Saved · Discover SB) */
  .nav-btn{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#9a8f80;cursor:pointer;position:relative;padding-top:7px;}
  .nav-btn.on{color:var(--pacific);}
  .nav-btn .i{font-size:17px;line-height:1;}
  .nav-btn .l{font-size:8.5px;font-weight:600;}
  .nav-badge{position:absolute;top:5px;right:calc(50% - 16px);background:var(--tile);color:#fff;font-size:8px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 4px;}

  /* HEADER */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:32px 18px 12px;background:var(--plaster);position:sticky;top:0;z-index:40;}
  .hdr .lg{display:flex;align-items:center;gap:9px;}
  .hdr .lg .m{width:28px;height:28px;border-radius:7px;background:var(--pacific);color:var(--gold);display:grid;place-items:center;font-weight:900;font-family:'Fraunces',serif;font-size:15px;}
  .hdr .lg .nm{font-family:'Fraunces',serif;font-weight:600;font-size:15px;line-height:1;}
  .hdr .lg .tg{font-size:8px;color:var(--sage);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
  .icon-btn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--ink);padding:5px;}

  /* HERO — Option A: Living editorial card */
  @keyframes sunPulse{0%,100%{box-shadow:0 0 50px 16px rgba(224,168,46,.5);}50%{box-shadow:0 0 70px 24px rgba(224,168,46,.35);}}
  @keyframes sunEntry{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
  @keyframes heroCardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .hero{position:relative;overflow:hidden;padding:14px 18px 0;min-height:200px;}
  .hero.morning{background:linear-gradient(180deg,#3d8aa0,#7cc0cf 55%,#f0e3c4);}
  .hero.afternoon{background:linear-gradient(180deg,#2f7fa0,#67b4cb 50%,#cfe0d4);}
  .hero.evening{background:linear-gradient(180deg,#1b4a5a,#2c6b78 35%,#d98a4a 80%,#e0a82e);}
  .hero.gray{background:linear-gradient(180deg,#4a5560,#6b7480 55%,#9aa3ad);}
  .hero .sun{position:absolute;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle,#FFF3D0,var(--gold) 60%,rgba(224,168,46,0) 72%);box-shadow:0 0 50px 16px rgba(224,168,46,.5);transition:all 1.2s cubic-bezier(.4,0,.2,1);animation:sunEntry .8s ease-out,sunPulse 3s ease-in-out 1s infinite;}
  .hero .cloud{position:absolute;right:26px;top:20px;width:70px;height:24px;background:rgba(255,255,255,.45);border-radius:24px;filter:blur(3px);}
  .hero .cloud:before{content:"";position:absolute;left:14px;top:-10px;width:34px;height:34px;background:inherit;border-radius:50%;}
  .hero-range{position:absolute;bottom:0;left:0;width:100%;height:66px;opacity:.9;}
  /* Sky ambient strip — date + conditions only, no greeting */
  .hero-sky{position:relative;z-index:2;color:#fff;padding-bottom:24px;}
  .hero .date{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;opacity:.92;text-shadow:0 1px 6px rgba(0,0,0,.3);}
  .hero .cond{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .hero .cond span{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);padding:4px 9px;border-radius:14px;font-size:9.5px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.3);backdrop-filter:blur(3px);}
  /* Option C — minimal side-by-side hero pick card */
  .hero-pick-card{position:relative;z-index:3;background:rgba(246,241,231,.98);border-radius:16px;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.24);cursor:pointer;animation:heroCardIn .5s cubic-bezier(.2,.8,.2,1);display:flex;align-items:stretch;}
  .hero-pick-img{width:96px;flex-shrink:0;position:relative;}
  .hero-pick-body{padding:11px 13px 12px;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px;}
  .hero-eyebrow{font-size:8.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--tile);}
  .hero-pick-title{font-family:'Fraunces',serif;font-size:15px;font-weight:700;line-height:1.1;letter-spacing:-.3px;color:var(--ink);}
  .hero-pick-meta{font-size:10px;font-weight:600;color:var(--pacific);}
  .hero-pick-cta{font-size:10px;font-weight:700;color:var(--tile);margin-top:1px;}
  /* image: only 2 badges — tag top-left, heart top-right */
  .hero-pick-tag{position:absolute;top:8px;left:8px;background:var(--gold);color:var(--ink);font-size:7.5px;font-weight:800;padding:3px 7px;border-radius:9px;letter-spacing:.3px;}
  .hero-pick-heart{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(20,30,35,.4);display:grid;place-items:center;color:#fff;font-size:13px;backdrop-filter:blur(4px);border:none;cursor:pointer;}

  /* CONTROLS — compact single-row design */
  .controls{background:var(--plaster);padding-top:12px;padding-bottom:10px;position:sticky;top:60px;z-index:35;transition:padding .3s;}
  .hseg{display:flex;gap:3px;background:var(--plaster2);border-radius:11px;padding:3px;margin:0 18px;}
  .hseg button{flex:1;padding:8px 0;border-radius:8px;border:none;font-size:12px;font-weight:700;background:transparent;color:#8a7f70;cursor:pointer;font-family:'Inter',sans-serif;}
  .hseg button.on{background:#fff;color:var(--pacific);box-shadow:0 1px 6px rgba(20,40,50,.1);}

  /* New compact dual-button row — replaces tall lens-pill + filter chip row */
  .ctrl-row{display:flex;gap:8px;margin:9px 18px 0;}
  .ctrl-lens{flex:1;display:flex;align-items:center;gap:7px;padding:9px 13px;border-radius:22px;border:1.5px solid var(--line);background:#fff;cursor:pointer;min-width:0;font-family:'Inter',sans-serif;transition:border-color .15s;}
  .ctrl-lens:active,.ctrl-lens.has-sel{border-color:var(--pacific);}
  .ctrl-lens .cl-icon{font-size:15px;flex-shrink:0;line-height:1;}
  .ctrl-lens .cl-text{flex:1;min-width:0;text-align:left;}
  .ctrl-lens .cl-label{font-size:10.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
  .ctrl-lens .cl-chevron{font-size:10px;color:var(--pacific);font-weight:700;flex-shrink:0;}
  .ctrl-filter{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:22px;border:1.5px solid var(--line);background:#fff;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:border-color .15s,background .15s;}
  .ctrl-filter.active{background:var(--pacific);border-color:var(--pacific);}
  .ctrl-filter .cf-icon{font-size:13px;line-height:1;}
  .ctrl-filter .cf-text{font-size:10.5px;font-weight:700;color:var(--ink2);}
  .ctrl-filter.active .cf-text{color:#fff;}
  .ctrl-filter.active .cf-icon{filter:brightness(10);}

  /* SECTION HEAD */
  .sh{margin:18px 18px 10px;}
  .sh .k{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--tile);}
  .sh .t{font-family:'Fraunces',serif;font-size:18px;font-weight:600;letter-spacing:-.3px;line-height:1.1;margin-top:2px;}

  /* FIRST LOOKS RAIL */
  @keyframes newPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.4);}}
  .rail-h{display:flex;align-items:center;gap:6px;margin:18px 18px 9px;}
  .rail-h .dot{width:7px;height:7px;border-radius:50%;background:var(--tile);animation:newPulse 1.8s ease-in-out infinite;}
  .rail-h .l{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tile);}
  .rail{display:flex;gap:10px;overflow-x:auto;padding:0 18px 4px;}
  .rail::-webkit-scrollbar{height:0;}
  .rcard{flex-shrink:0;width:140px;border-radius:14px;overflow:hidden;background:#fff;border:1px solid var(--line);cursor:pointer;}
  .rcard .img{height:80px;position:relative;}
  .rcard .flag{position:absolute;top:8px;left:8px;background:var(--gold);color:var(--ink);font-size:8px;font-weight:800;padding:3px 7px;border-radius:10px;letter-spacing:.3px;}
  .rcard .rheart{position:absolute;bottom:7px;right:7px;width:26px;height:26px;border-radius:50%;background:rgba(20,30,35,.45);display:grid;place-items:center;border:none;color:#fff;font-size:12px;cursor:pointer;backdrop-filter:blur(4px);}
  .rcard .meta{padding:9px 10px;}
  .rcard .nm{font-family:'Fraunces',serif;font-size:13px;font-weight:600;line-height:1.1;}
  .rcard .sub{font-size:9.5px;color:var(--pacific);font-weight:600;margin-top:2px;}

  /* PICK CARD */
  .pick{margin:14px 18px 0;background:#fff;border-radius:18px;overflow:hidden;border:1px solid var(--line);box-shadow:0 14px 34px -20px rgba(20,40,50,.45);cursor:pointer;}
  .pick .img{height:120px;position:relative;}
  .pick .tag{position:absolute;top:11px;left:11px;display:inline-flex;align-items:center;gap:4px;background:var(--gold);color:var(--ink);font-size:9.5px;font-weight:800;padding:5px 10px;border-radius:16px;}
  .heart{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:50%;background:rgba(20,30,35,.4);display:grid;place-items:center;backdrop-filter:blur(4px);cursor:pointer;border:none;color:#fff;font-size:17px;transition:transform .15s;}
  .heart:active{transform:scale(1.35);}
  .pick .place{position:absolute;bottom:10px;left:11px;display:inline-flex;align-items:center;gap:4px;background:rgba(20,30,35,.6);color:#fff;font-size:9.5px;font-weight:600;padding:5px 9px;border-radius:14px;backdrop-filter:blur(4px);}
  .pick .body{padding:14px 16px 16px;}
  .pick .ttl{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.08;letter-spacing:-.4px;}
  .pick .blurb{font-size:12px;line-height:1.5;color:#4a4038;margin:8px 0 13px;}
  .pick .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .pick .facts{display:flex;gap:11px;font-size:11px;font-weight:600;color:var(--pacific);}
  .btn-buy{display:inline-flex;align-items:center;gap:5px;background:var(--tile);color:#fff;border:none;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}

  /* LIST CARD */
  .lc{display:flex;margin:11px 18px 0;background:#fff;border-radius:15px;overflow:hidden;border:1px solid var(--line);cursor:pointer;align-items:center;}
  .lc .thumb{width:84px;flex-shrink:0;align-self:stretch;}
  .lc .b{padding:11px 13px;flex:1;min-width:0;}
  .lc .tag{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 7px;border-radius:12px;display:inline-block;color:#fff;margin-bottom:5px;}
  .lc .nm{font-family:'Fraunces',serif;font-size:15px;font-weight:600;line-height:1.12;letter-spacing:-.2px;}
  .lc .bl{font-size:10.5px;line-height:1.4;color:#6a5f54;margin:4px 0 6px;}
  .lc .m{font-size:10px;color:var(--pacific);font-weight:600;}
  @keyframes heartPop{0%{transform:scale(1);}40%{transform:scale(1.5);}70%{transform:scale(.9);}100%{transform:scale(1);}}
  .inline-heart{background:none;border:none;font-size:20px;cursor:pointer;padding:10px 12px;flex-shrink:0;transition:transform .15s;line-height:1;}
  .inline-heart:active{transform:scale(1.4);}
  .heart-pop{animation:heartPop .35s cubic-bezier(.36,.07,.19,.97);}

  /* HAPPY HOUR */
  @keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 8px #7CE0A8;}50%{opacity:.5;box-shadow:0 0 4px #7CE0A8;}}
  @keyframes urgentPulse{0%,100%{opacity:1;}50%{opacity:.65;}}
  .hh{margin:16px 18px 0;background:linear-gradient(135deg,var(--pacific),var(--pacificDk));border-radius:18px;padding:16px 16px 8px;color:#fff;position:relative;overflow:hidden;cursor:pointer;}
  .hh .live{display:flex;align-items:center;gap:6px;}
  .hh .live .p{width:7px;height:7px;border-radius:50%;background:#7CE0A8;animation:livePulse 1.8s ease-in-out infinite;}
  .hh .live .l{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .hh .t{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:5px 0 11px;letter-spacing:-.3px;}
  .hh .row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(255,255,255,.14);}
  .hh .row:first-of-type{border-top:none;}
  .hh .rn{font-weight:700;font-size:12px;}
  .hh .rd{font-size:10px;color:rgba(255,255,255,.82);margin-top:1px;}
  .hh .rt{font-size:9px;font-weight:700;padding:4px 8px;border-radius:14px;white-space:nowrap;}
  .hh .rt.soon{background:rgba(224,82,46,.95);animation:urgentPulse 1.4s ease-in-out infinite;}
  .hh .rt.ok{background:rgba(255,255,255,.16);}

  /* WEEK / MONTH */
  .day{display:flex;gap:13px;margin:0 18px 16px;}
  .day .dd{flex-shrink:0;width:44px;text-align:center;}
  .day .dd .w{font-size:9.5px;font-weight:700;color:var(--tile);letter-spacing:1px;}
  .day .dd .n{font-family:'Fraunces',serif;font-size:23px;font-weight:600;line-height:1;}
  .day .items{flex:1;display:flex;flex-direction:column;gap:7px;}
  .day .it{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .day .it .nm{font-family:'Fraunces',serif;font-size:13.5px;font-weight:600;line-height:1.1;}
  .day .it .m{font-size:10px;color:var(--pacific);font-weight:600;margin-top:1px;}
  .rock{margin:0 18px 13px;border-radius:18px;overflow:hidden;position:relative;min-height:130px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 12px 28px -16px rgba(20,40,50,.4);cursor:pointer;}
  .rock .ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.64));}
  .rock .c{position:relative;padding:14px 16px;color:#fff;}
  .rock .when{display:inline-block;background:var(--gold);color:var(--ink);font-size:9.5px;font-weight:800;padding:4px 9px;border-radius:13px;margin-bottom:7px;}
  .rock .ttl{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.1;}
  .rock .vn{font-size:10.5px;opacity:.9;margin-top:2px;}
  .rock .nt{font-size:11px;margin-top:5px;font-weight:500;}

  /* PLAN BANNER */
  .plan-banner{margin:12px 18px 0;background:linear-gradient(135deg,rgba(224,168,46,.18),rgba(224,168,46,.06));border:1.5px solid var(--gold);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;}
  .plan-banner .pb-icon{font-size:22px;flex-shrink:0;}
  .plan-banner .pb-body{flex:1;}
  .plan-banner .pb-t{font-size:13px;font-weight:700;color:#7a5410;}
  .plan-banner .pb-s{font-size:11px;color:#9a7a50;margin-top:2px;}
  .plan-banner .pb-btn{background:var(--pacific);color:#fff;border:none;border-radius:9px;padding:8px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;}

  /* EMPTY */
  .empty{margin:20px 18px;padding:26px 20px;text-align:center;border:1.5px dashed var(--line);border-radius:16px;color:#6a5f54;font-size:13px;}
  .empty b{color:var(--ink);}

  /* DETAIL */
  .detail{position:absolute;inset:0;background:var(--plaster);overflow-y:auto;z-index:130;}
  .detail::-webkit-scrollbar{width:0;}
  .detail .img{height:200px;position:relative;}
  .d-back{position:absolute;top:40px;left:16px;width:34px;height:34px;border-radius:50%;background:rgba(20,30,35,.45);display:grid;place-items:center;color:#fff;backdrop-filter:blur(5px);border:none;font-size:20px;cursor:pointer;z-index:5;}
  .d-acts{position:absolute;top:40px;right:16px;display:flex;gap:8px;z-index:5;}
  .d-acts button{width:34px;height:34px;border-radius:50%;background:rgba(20,30,35,.45);display:grid;place-items:center;color:#fff;backdrop-filter:blur(5px);border:none;font-size:15px;cursor:pointer;}
  .d-pick{position:absolute;bottom:12px;left:16px;display:inline-flex;align-items:center;gap:4px;background:var(--gold);color:var(--ink);font-size:9.5px;font-weight:800;padding:5px 10px;border-radius:14px;}
  .d-body{padding:18px;}
  .d-ttl{font-family:'Fraunces',serif;font-size:23px;font-weight:600;line-height:1.08;letter-spacing:-.4px;}
  .d-tags{display:flex;gap:6px;flex-wrap:wrap;margin:11px 0;align-items:center;}
  .d-tags .gf{font-size:10px;color:#6a5f54;font-weight:600;}
  .ptag{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;padding:4px 9px;border-radius:14px;background:#fff;}
  .d-blurb{font-size:13px;line-height:1.6;color:#4a4038;margin:14px 0;}
  .facts-block{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:4px 0;margin:16px 0;}
  .fact{display:flex;align-items:center;gap:11px;padding:11px 0;}

// ---- TIME HELPERS ----
function to24h(label){
  // "6:00 PM" -> "18:00" for <input type=time>
  const m=(label||'').match(/(\d+):(\d+)\s*([AP]M)/i);
  if(!m) return '18:00';
  let h=parseInt(m[1],10); const min=m[2]; const ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12) h+=12; if(ap==='AM'&&h===12) h=0;
  return `${String(h).padStart(2,'0')}:${min}`;
}
function from24h(v){
  // "18:30" -> "6:30 PM"
  const [H,M]=(v||'18:00').split(':').map(Number);
  const ap=H<12?'AM':'PM'; const h12=H===0?12:H>12?H-12:H;
  return `${h12}:${String(M).padStart(2,'0')} ${ap}`;
}
function parseTime(str){
  // '6:00 PM' -> minutes from midnight
  const [time,ampm]=str.split(' ');
  let [h,m]=time.split(':').map(Number);
  if(ampm==='PM'&&h!==12) h+=12;
  if(ampm==='AM'&&h===12) h=0;
  return h*60+m;
}
function fmtTime(mins){
  // minutes from midnight -> '6:00 PM'
  let h=Math.floor(mins/60)%24;
  const m=mins%60;
  const ampm=h>=12?'PM':'AM';
  if(h>12) h-=12;
  if(h===0) h=12;
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}

const AREA_TO_HOOD={
  'Funk Zone':'funk','Downtown':'downtown','Lower State':'downtown',
  'Waterfront':'waterfront','The Harbor':'waterfront','Santa Barbara & Cota':'downtown',
  'Montecito':'montecito','The Mesa':'mesa','Mesa':'mesa',
  'Bowl':'downtown','Mission':'downtown','Goleta':'goleta',
};
function itemHood(item){return AREA_TO_HOOD[item.area]||null;}
function isNearby(item,hood){if(!hood) return false; return itemHood(item)===hood;}
// Map the chosen Near-Me anchor label to a neighborhood key
const ANCHOR_TO_HOOD={
  'Your location':'downtown','Funk Zone':'funk','Downtown / State St.':'downtown',
  'The Waterfront':'waterfront','Montecito':'montecito','The Mesa':'mesa','Goleta':'goleta',
};
function anchorHood(){return ANCHOR_TO_HOOD[S.nearbyAnchor]||'downtown';}
// Stable "Near Me" sort: things in the anchored neighborhood bubble to the top
function nearMeSort(list){
  if(!S.nearMe) return list;
  const h=anchorHood();
  return list.map((t,i)=>[t,i]).sort((a,b)=>{
    const na=itemHood(a[0])===h?0:1, nb=itemHood(b[0])===h?0:1;
    return na-nb || a[1]-b[1];
  }).map(x=>x[0]);
}

// Shuffle helper for Surprise Me
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ---- HOME ----
function renderHome(){
  let body='';
  // Resolve the hero marquee item upfront — always defined before heroHTML() is called
  const todayPool=THINGS.filter(t=>(t.type==='event'&&t.horizon==='today')||t.type==='place').filter(pass);
  let heroMarquee=todayPool.find(t=>t.tier==='marquee');
  if(S.weather==='gray') heroMarquee=todayPool.find(t=>t.indoor)||heroMarquee;
  if(!heroMarquee) heroMarquee=todayPool[0]||null;

  if(S.horizon==='today'){
    let rest=S.weather==='gray'
      ? todayPool.filter(t=>t!==heroMarquee&&t.indoor)
      : todayPool.filter(t=>t!==heroMarquee);
    rest=nearMeSort(rest).slice(0,6);
    const restHdr=S.nearMe
      ? `<div class="sh"><div class="k">📍 Near ${S.nearbyAnchor==='Your location'?'you':S.nearbyAnchor}</div><div class="t">Closest first</div></div>`
      : `<div class="sh"><div class="k">${S.weather==='gray'?'Also worth it · indoors':'Also happening'}</div><div class="t">More ways to spend the day</div></div>`;
    body=perfectDayCardHTML()
      +railHTML()
      +(rest.length?restHdr+rest.map(lcHTML).join(''):'')
      +newThisWeekHTML()
      +hhTeaser()
      +planBannerHTML()
      +emailSignupHTML()
      +trustNoteHTML()
      +submitBtnHTML()+'<div class="scroll-pad"></div>';
  } else if(S.horizon==='week'){
    const evs=THINGS.filter(t=>t.horizon==='week').filter(pass);
    const days=[...new Set(evs.map(e=>e.day))];
    body=`<div class="sh"><div class="k">Next 7 days</div><div class="t">What's on this week in Santa Barbara</div></div>`;
    if(!evs.length) body+=`<div class="empty">Nothing for <b>${persona(S.lens).name}</b> this week. Try another tag.</div>`;
    days.forEach(d=>{
      const items=nearMeSort(evs.filter(e=>e.day===d));
      body+=`<div class="day"><div class="dd"><div class="w">${d}</div><div class="n">${items[0].date}</div></div><div class="items">${items.map(it=>`<div class="it" onclick="APP.openDetail('${it.id}')"><div><div class="nm">${it.title}</div><div class="m">${it.venue} · ${it.price}</div></div>${heartBtn(it.id,false)}</div>`).join('')}</div></div>`;
    });
    body+=planBannerHTML()+'<div class="scroll-pad"></div>';
  } else {
    const rocks=nearMeSort(THINGS.filter(t=>t.horizon==='month').filter(pass));
    body=`<div class="sh"><div class="k">The big rocks</div><div class="t">Worth circling on your calendar</div></div>`;
    if(!rocks.length) body+=`<div class="empty">Nothing for <b>${persona(S.lens).name}</b> this month. Try another tag.</div>`;
    rocks.forEach(r=>{
      body+=`<div class="rock" style="background:${r.img};" onclick="APP.openDetail('${r.id}')"><div class="ov"></div>${heartBtn(r.id,true)}<div class="c"><div class="when">${r.when}</div><div class="ttl">${r.title}</div><div class="vn">${r.venue}</div><div class="nt">${r.note}</div></div></div>`;
    });
    body+=planBannerHTML()+'<div class="scroll-pad"></div>';
  }
  // heroMarquee is always defined above — safe to pass in all horizon states
  return headerHTML('Explore','Santa Barbara, daily')+heroHTML(heroMarquee)+controlsHTML()+body;
}

function headerHTML(nm,tg,back){
  const left=back
    ?`<button class="icon-btn" onclick="APP.go('${back}')" style="font-size:20px;">‹</button><div><div class="nm">${nm}</div>${tg?`<div class="tg">${tg}</div>`:''}</div>`
    :`<div class="m">S</div><div><div class="nm">${nm}</div>${tg?`<div class="tg">${tg}</div>`:''}</div>`;
  return `<div class="hdr"><div class="lg">${left}</div></div>`;
}

// ---- SAVED ----
function savedTypeLabel(t){
  if(t.cat==='happyhour') return 'happyhour';
  if(t.type==='place'||t.type==='firstlook') return 'places';
  if(t.type==='event') return 'events';
  return 'all';
}
function svCardHTML(t){
  const st=S.savedState[t.id]||'want';
  const flipLabel=st==='been'?'↩ Want to go':'✓ Mark as been';
  // SELECT MODE — tap to pick for sharing (one or many)
  if(S.sv.selectMode){
    const sel=S.sv.selected.has(t.id);
    return `<div class="lc" onclick="APP.toggleShareSelect('${t.id}')" style="${sel?'border-color:var(--pacific);box-shadow:0 0 0 1.5px var(--pacific);':''}">
      <div style="display:grid;place-items:center;width:44px;flex-shrink:0;align-self:stretch;">
        <span style="width:24px;height:24px;border-radius:50%;border:2px solid ${sel?'var(--pacific)':'var(--line)'};background:${sel?'var(--pacific)':'#fff'};color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800;">${sel?'✓':''}</span>
      </div>
      <div class="thumb" style="background:${t.img};"></div>
      <div class="b"><div class="nm">${t.title}</div><div class="m">${t.venue} · ${t.price}</div></div>
    </div>`;
  }
  // NORMAL MODE — open detail; share-this + want/been flip
  return `<div style="position:relative;">${lcHTML(t)}
    <button onclick="event.stopPropagation();APP.shareSingle('${t.id}')" title="Share this" style="position:absolute;right:14px;top:10px;background:#fff;color:var(--pacific);border:1.5px solid var(--line);border-radius:50%;width:28px;height:28px;display:grid;place-items:center;font-size:13px;cursor:pointer;z-index:2;">↗</button>
    <button onclick="event.stopPropagation();APP.flipSaveState('${t.id}')" style="position:absolute;right:14px;bottom:10px;background:${st==='been'?'var(--sage)':'#fff'};color:${st==='been'?'#fff':'var(--sage)'};border:1.5px solid var(--sage);border-radius:14px;padding:3px 9px;font-size:9.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;z-index:2;">${flipLabel}</button>
  </div>`;
}
function renderSaved(){
  const allSaved=THINGS.filter(t=>S.saved.has(t.id));
  const tf=S.sv.typeFilter;
  const inSelect=S.sv.selectMode;

  let body=`<div class="hdr" style="padding-bottom:8px;">
    <div class="lg"><div class="m">S</div><div><div class="nm">Saved</div><div class="tg">On your phone, no account</div></div></div>
    ${allSaved.length?(inSelect
      ?`<button class="icon-btn" onclick="APP.exitShareSelect()" style="font-size:13px;font-weight:700;color:var(--pacific);padding:5px 8px;">Done</button>`
      :`<button class="icon-btn" onclick="APP.enterShareSelect()" style="font-size:13px;font-weight:700;color:var(--pacific);padding:5px 8px;">↗ Share</button>`):''}
  </div>`;

  if(!allSaved.length){
    body+=`<div class="empty" style="margin-top:20px;">
      <div style="font-size:28px;">🤍</div>
      <div class="serif" style="font-size:17px;font-weight:600;color:#241C16;margin-top:10px;">Nothing saved yet</div>
      <div style="margin-top:5px;">Tap the heart on anything to save it here — no account needed.</div>
      <button class="bigbuy" style="margin-top:16px;" onclick="APP.go('home')">→ See today's picks</button>
      <div style="margin-top:14px;font-size:11.5px;color:var(--sage);">Saved on another device? <button onclick="APP.emailRestore()" style="background:none;border:none;color:var(--pacific);font-weight:700;cursor:pointer;font-size:11.5px;text-decoration:underline;">Email me a link to restore →</button></div>
    </div>`;
    return body+'<div class="scroll-pad"></div>';
  }

  // ── SELECT MODE — choose items, then share (individually or several) ──────────
  if(inSelect){
    body+=`<div style="padding:0 18px 8px;font-size:12px;color:var(--sage);font-weight:600;">Tap to choose what to send — one or many.</div>`;
    const list=nearMeSort(allSaved);
    body+=list.map(svCardHTML).join('');
    const n=S.sv.selected.size;
    const allSel=n===allSaved.length;
    body+=`<div style="position:sticky;bottom:0;background:linear-gradient(180deg,rgba(246,241,231,0),var(--plaster) 36%);padding:16px 18px 8px;display:grid;gap:8px;">
      <button class="bigbuy" ${n?'':'disabled style="opacity:.5;cursor:default;"'} onclick="${n?'APP.shareSelected()':''}">🔗 Share ${n||''} ${n===1?'item':'items'} →</button>
      <button class="secondary" onclick="APP.selectAllSaved()">${allSel?'Clear selection':'Select all'}</button>
      <div style="text-align:center;font-size:10.5px;color:var(--sage);">Friends open a link, see your list, and can save their own copy. Sent via your share sheet — no account.</div>
    </div>`;
    return body+'<div class="scroll-pad"></div>';
  }

  // Want-to-go / Been state filter (Decision 7)
  const wantCount=allSaved.filter(t=>(S.savedState[t.id]||'want')==='want').length;
  const beenCount=allSaved.filter(t=>S.savedState[t.id]==='been').length;
  const sf=S.sv.stateFilter||'want';
  body+=`<div style="display:flex;gap:8px;padding:0 18px 10px;">
    <button onclick="APP.setSavedState('want')" style="flex:1;padding:9px 0;border-radius:11px;border:1.5px solid ${sf==='want'?'var(--pacific)':'var(--line)'};background:${sf==='want'?'var(--pacific)':'#fff'};color:${sf==='want'?'#fff':'var(--ink2)'};font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">Want to go${wantCount?' · '+wantCount:''}</button>
    <button onclick="APP.setSavedState('been')" style="flex:1;padding:9px 0;border-radius:11px;border:1.5px solid ${sf==='been'?'var(--pacific)':'var(--line)'};background:${sf==='been'?'var(--pacific)':'#fff'};color:${sf==='been'?'#fff':'var(--ink2)'};font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">Been${beenCount?' · '+beenCount:''}</button>
  </div>`;
  // Type filter chips + Near Me sort
  const typeOpts=[
    {id:'all',label:'All'},
    {id:'events',label:'Events'},
    {id:'places',label:'Places'},
    {id:'happyhour',label:'Happy Hours'},
  ];
  body+=`<div style="display:flex;gap:7px;padding:0 18px 10px;overflow-x:auto;">
    ${typeOpts.map(o=>`<button style="flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid ${tf===o.id?'var(--pacific)':'var(--line)'};background:${tf===o.id?'var(--pacific)':'#fff'};color:${tf===o.id?'#fff':'var(--ink2)'};font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;" onclick="APP.setSavedFilter('${o.id}')">${o.label}</button>`).join('')}
  </div>`;
  body+=`<div style="display:flex;gap:7px;padding:0 18px 12px;">${nearMeBtnHTML()}</div>`;

  // Apply state filter (want/been) then type filter
  const stateF = S.sv.stateFilter||'want';
  const stateSaved = allSaved.filter(t=>(S.savedState[t.id]||'want')===stateF);
  const filtered = tf==='all' ? stateSaved : stateSaved.filter(t=>savedTypeLabel(t)===tf);

  if(!filtered.length){
    const sLabel=(S.sv.stateFilter||'want')==='been'?'marked "been"':'in "want to go"';
    body+=`<div class="empty">Nothing ${sLabel}${tf!=='all'?' under '+tf:''} yet.<br><br><button onclick="APP.setSavedFilter('all')" style="background:none;border:none;color:var(--pacific);font-weight:700;cursor:pointer;font-size:13px;">Show all →</button></div>`;
    return body+'<div class="scroll-pad"></div>';
  }

  if(tf!=='all'||S.nearMe){
    // Flat list (Near Me sort collapses the groups into one distance-ordered list)
    if(S.nearMe) body+=`<div class="sv-group-hdr"><span class="sv-group-dot" style="background:var(--pacific);"></span>📍 Near ${S.nearbyAnchor==='Your location'?'you':S.nearbyAnchor} · closest first</div>`;
    body+=nearMeSort(filtered).map(svCardHTML).join('');
  } else {
    // Auto-group by time relevance + type
    const tonight=filtered.filter(t=>t.horizon==='today'&&t.type==='event');
    const thisWeek=filtered.filter(t=>t.horizon==='week');
    const hh=filtered.filter(t=>t.cat==='happyhour'&&t.horizon!=='today'&&t.horizon!=='week');
    const places=filtered.filter(t=>
      !tonight.includes(t)&&!thisWeek.includes(t)&&!hh.includes(t)
    );

    if(tonight.length){
      body+=`<div class="sv-group-hdr"><span class="sv-group-dot" style="background:var(--tile);"></span>Tonight</div>`;
      body+=tonight.map(svCardHTML).join('');
    }
    if(thisWeek.length){
      body+=`<div class="sv-group-hdr"><span class="sv-group-dot" style="background:var(--gold);"></span>This Week</div>`;
      body+=thisWeek.map(svCardHTML).join('');
    }
    if(hh.length){
      body+=`<div class="sv-group-hdr"><span class="sv-group-dot" style="background:var(--pacific);"></span>Happy Hours</div>`;
      body+=hh.map(svCardHTML).join('');
    }
    if(places.length){
      body+=`<div class="sv-group-hdr"><span class="sv-group-dot" style="background:var(--sage);"></span>Places &amp; Experiences</div>`;
      body+=places.map(svCardHTML).join('');
    }
  }

  body+=`<div style="padding:16px 18px 0;display:grid;gap:10px;">
    <button class="bigbuy" style="background:var(--pacific);" onclick="APP.enterShareSelect()">↗ Share my list →</button>
    <div style="text-align:center;font-size:10.5px;color:var(--sage);margin-top:-3px;">Pick one or several — friends open the link &amp; can save their own copy. No account.</div>
    <button class="secondary" onclick="APP.emailRestore()" style="font-size:12px;">📧 Back up my saves to an email link</button>
    <div style="text-align:center;font-size:10.5px;color:var(--sage);margin-top:-3px;">The backup link restores your saves on any device.</div>
  </div>`;
  return body+'<div class="scroll-pad"></div>';
}

      <button class="bigbuy" style="margin-top:18px;background:#16586A;" onclick="APP.closeSheet()">Show results</button>
    </div>`;
  }
  if(S.sheet==='anchor'){
    const hoods=['Use my location 🧭','Funk Zone','Downtown / State St.','The Waterfront','Montecito','The Mesa','Goleta'];
    return `<div class="scrim" onclick="APP.closeSheet()"></div><div class="sheet">
      <div class="grab"></div><div class="sk">Where are you?</div><div class="st">Set your Nearby starting point</div>
      ${hoods.map(h=>`<div class="persona ${ (S.nearbyAnchor||'Downtown / State St.')===h ?'sel':''}" onclick="APP.setNearbyAnchor('${h}')"><div class="pic" style="background:var(--pacific);">📍</div><div><span class="pn">${h}</span></div></div>`).join('')}
    </div>`;
  }
  return '';
}

// ---- LENS BANNER ----
function lensBannerHTML(){
  const personasToShow=PERSONAS.filter(p=>p.id!=='all');
  return `<div class="scrim-soft" onclick="APP.dismissLens()"></div>
    <div class="lens-banner">
      <button class="lb-close" onclick="APP.dismissLens()">✕</button>
      <div class="lb-k">Welcome to SB Daymaker</div>
      <div class="lb-t">What vibe are you looking for?</div>
      <div class="lb-grid">
        ${personasToShow.map(p=>`<div class="lb-p" onclick="APP.pickFirstRun('${p.id}')"><div class="pic" style="background:${p.color};">${p.icon}</div><div class="pn">${p.name}</div></div>`).join('')}
      </div>
      <div class="lb-skip" onclick="APP.dismissLens()">Just show me everything →</div>
    </div>`;
}

// ---- NAV — 3 tabs (v9: Activity Explorer · Saved List · Discover SB) ----
function navHTML(){
  const items=[
    ['home','🌅','Explore'],
    ['saved','❤️','Saved'],
    ['guides','🧭','Discover SB'],
  ];
  return items.map(([k,i,l])=>{
    const on=(k===S.screen)||(k==='home'&&['submit'].includes(S.screen));
    const badge=k==='saved'&&S.saved.size?`<span class="nav-badge">${S.saved.size}</span>`:'';
    return `<button class="nav-btn ${on?'on':''}" onclick="APP.go('${k}')"><span class="i">${i}</span><span class="l">${l}</span>${badge}</button>`;
  }).join('');
}

// ---- OVERLAY + RENDER ----
function renderOverlay(){
  let html='';
  if(S.detail){html=detailHTML();$ov.classList.add('active');}
  else if(S.sheet){html=sheetHTML();$ov.classList.add('active');}
  else{$ov.classList.remove('active');}
  if(S.toast) html+=`<div class="toast">${S.toast}</div>`;
  $ov.innerHTML=html;
  if(S.firstRun&&S.screen==='home'){
    $lo.innerHTML=lensBannerHTML();$lo.style.pointerEvents='auto';
  } else {
    $lo.innerHTML='';$lo.style.pointerEvents='none';
  }
}

function render(){
  let main='';
  if(S.screen==='home') main=renderHome();
  else if(S.screen==='saved') main=renderSaved();
  else if(S.screen==='guides') main=renderGuides();
  else if(S.screen==='submit') main=renderSubmit();

  $app.style.overflow='auto';
  $app.innerHTML=main;
  $app.scrollTop=0;
  $nav.innerHTML=navHTML();
  renderOverlay();

  // Controls are always compact
  $app.onscroll=null;
}

// ---- APP CONTROLLER ----
const APP={
  go(s){
    S.screen=s;
    if(s!=='guides') S.guide=null;
    if(s!=='saved'){ S.sv.selectMode=false; S.sv.selected=new Set(); }
    render();
  },
  setHorizon(h){S.horizon=h;render();},
  setLens(id){S.lens=id;S.sheet=null;S.filters=new Set();render();},
  openSheet(s){S.sheet=s;render();},
  // ---- NEAR ME (v9: in-view sort for Explorer + Saved) ----
  toggleNearMe(){ S.nearMe=true; S.sheet='anchor'; render(); },
  clearNearMe(){ S.nearMe=false; render(); },
  setNearbyAnchor(h){ S.nearbyAnchor = h==='Use my location 🧭' ? 'Your location' : h; S.nearMe=true; S.sheet=null; render(); },
  closeSheet(){ S.sheet=null; render(); },
  toggleFilter(f){if(S.filters.has(f))S.filters.delete(f);else S.filters.add(f);render();},
  toggleSave(id){
    const wasSaved=S.saved.has(id);
    if(wasSaved){ S.saved.delete(id); delete S.savedState[id]; S.sv.selected.delete(id); }
    else { S.saved.add(id); S.savedState[id]='want'; }
    const btn=document.getElementById('hb_'+id);
    if(btn){
      btn.textContent=S.saved.has(id)?'❤️':'🤍';
      btn.classList.remove('heart-pop');
      void btn.offsetWidth;
      if(!wasSaved) btn.classList.add('heart-pop');
    }
    if(!wasSaved){
      const t=THINGS.find(x=>x.id===id);
      this.toastMsg(S.saved.size===1?`❤️ Added to "want to go" — share your list anytime.`:`❤️ ${t?t.title:'Saved'} — want to go!`);
    }
    $nav.innerHTML=navHTML();
    const pb=document.querySelector('.plan-banner');
    if(pb) pb.outerHTML=planBannerHTML();
    const saveBtn=document.getElementById('saveBtn_'+id);
    if(saveBtn) saveBtn.textContent=S.saved.has(id)?'✓ On your want-to-go list':'♡ Want to go';
  },
  flipSaveState(id){
    if(!S.saved.has(id)) return;
    S.savedState[id]=S.savedState[id]==='been'?'want':'been';
    render();
  },
  emailRestore(){ this.toastMsg('📧 Check your inbox — a link to restore your saves on any device.'); },
  openDetail(id){S.detail=id;render();},
  closeDetail(){S.detail=null;render();},
  openGuide(id){S.guide=id;render();},
  closeGuide(){S.guide=null;render();},
  pickFirstRun(id){S.lens=id;S.firstRun=false;render();},
  dismissLens(){S.firstRun=false;render();},
  restart(){
    S.firstRun=true;S.lens='all';S.screen='home';S.horizon='today';
    S.saved=new Set();S.savedState={};S.filters=new Set();
    S.nearMe=false;S.nearbyAnchor='Downtown / State St.';
    S.sv={typeFilter:'all',stateFilter:'want',selectMode:false,selected:new Set()};
    render();
  },
  setTod(t){S.tod=t;render();},
  setWeather(w){S.weather=w;render();},
  toastMsg(m){
    S.toast=m;renderOverlay();
    clearTimeout(this._t);
    this._t=setTimeout(()=>{S.toast=null;renderOverlay();},2400);
  },
  // ---- SAVED LIST ACTIONS ----
  setSavedFilter(f){S.sv.typeFilter=f;render();},
  setSavedState(st){S.sv.stateFilter=st;render();},
  // ---- ONE PERFECT SB DAY (v9: seeds saved list, then opens Saved to tweak & share) ----
  perfectDay(){
    const ids=['x2','p3','p1','p2'].filter(id=>THINGS.find(t=>t.id===id));
    ids.forEach(id=>{S.saved.add(id); if(!S.savedState[id])S.savedState[id]='want';});
    S.screen='saved';
    this.toastMsg('🌅 One Perfect SB Day added to your saved list — tweak it, then share.');
    render();
  },
  // ---- SHARE THE SAVED LIST (individually or several) ----
  enterShareSelect(){ S.sv.selectMode=true; S.sv.selected=new Set(); S.screen='saved'; render(); },
  exitShareSelect(){ S.sv.selectMode=false; S.sv.selected=new Set(); render(); },
  toggleShareSelect(id){ if(S.sv.selected.has(id)) S.sv.selected.delete(id); else S.sv.selected.add(id); render(); },
  selectAllSaved(){
    const all=THINGS.filter(t=>S.saved.has(t.id)).map(t=>t.id);
    if(S.sv.selected.size===all.length) S.sv.selected=new Set();
    else S.sv.selected=new Set(all);
    render();
  },
  shareSelected(){
    const n=S.sv.selected.size; if(!n) return;
    S.sv.selectMode=false; S.sv.selected=new Set();
    render();
    this.toastMsg(`🔗 List link ready (${n} ${n===1?'spot':'spots'}) — pick how to send it (Messages, WhatsApp, email…).`);
  },
  shareSingle(id){
    const t=THINGS.find(x=>x.id===id);
    this.toastMsg(`🔗 Link to "${t?t.title:'this spot'}" ready — pick how to send it.`);
  },
};

document.querySelectorAll('#todSeg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#todSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');APP.setTod(b.dataset.tod);
});
document.querySelectorAll('#wxSeg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#wxSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');APP.setWeather(b.dataset.wx);
});

render();
</script>
</body>
</html>
